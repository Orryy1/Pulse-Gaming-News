<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Arial Black", "Inter", system-ui, sans-serif;
      }

      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0d0d0f;
      }

      .backdrop {
        position: absolute;
        inset: 0;
        background: url("assets/backdrop.jpg") center/cover no-repeat;
        filter: blur(24px) brightness(0.5) saturate(0.5) contrast(1.08);
        transform: scale(1.08);
      }

      .shade {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent 28%),
          linear-gradient(to top, rgba(0, 0, 0, 0.74), transparent 32%),
          rgba(0, 0, 0, 0.22);
      }

      .clip {
        position: absolute;
        inset: 0;
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .rule {
        width: 1px;
        height: 3px;
        background: #ff6b1a;
        box-shadow: 0 0 26px rgba(255, 107, 26, 0.72);
      }

      .kicker {
        margin-top: 42px;
        color: #ff6b1a;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: 0.28em;
      }

      .number {
        margin-top: 18px;
        color: #ffffff;
        font-size: 152px;
        font-weight: 900;
        line-height: 0.95;
        text-shadow:
          0 5px 0 rgba(0, 0, 0, 0.58),
          0 12px 34px rgba(0, 0, 0, 0.74);
      }

      .sub {
        margin-top: 24px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 32px;
        font-weight: 800;
        letter-spacing: 0.22em;
      }

      .micro {
        margin-top: 46px;
        color: rgba(255, 255, 255, 0.58);
        font-family: Consolas, monospace;
        font-size: 24px;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4.0"
      data-width="1080"
      data-height="1920"
    >
      <div class="clip" data-start="0" data-duration="4.0" data-track-index="0">
        <div class="backdrop"></div>
        <div class="shade"></div>
        <div class="stage">
          <div id="rule-top" class="rule"></div>
          <div id="kicker" class="kicker" style="opacity: 0">CONTEXT</div>
          <div
            id="number"
            class="number"
            style="opacity: 0; transform: translateY(24px) scale(0.98)"
          >
            7 YEARS
          </div>
          <div id="sub" class="sub" style="opacity: 0">EXODUS LANDED IN 2019</div>
          <div id="micro" class="micro" style="opacity: 0">
            official reveal trailer now live
          </div>
          <div id="rule-bottom" class="rule" style="margin-top: 42px"></div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out" },
      });

      tl.to("#rule-top", { width: 720, duration: 0.52 }, 0)
        .to("#kicker", { opacity: 1, duration: 0.34 }, 0.16)
        .to(
          "#number",
          { opacity: 1, y: 0, scale: 1, duration: 0.62 },
          0.42,
        )
        .to("#sub", { opacity: 1, duration: 0.36 }, 0.96)
        .to("#micro", { opacity: 1, duration: 0.38 }, 1.24)
        .to("#rule-bottom", { width: 720, duration: 0.52 }, 1.08);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
