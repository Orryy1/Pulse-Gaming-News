<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Arial Black", "Inter", system-ui, sans-serif;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0D0D0F;
      }

      .backdrop {
        position: absolute;
        inset: 0;
        background: url("assets/backdrop.jpg") center/cover no-repeat;
        filter: blur(28px) brightness(0.42) saturate(0.5) contrast(1.1);
        transform: scale(1.1);
      }
      .shade {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 32%),
          linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent 32%),
          rgba(0, 0, 0, 0.28);
      }

      .clip {
        position: absolute;
        inset: 0;
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 80px;
      }

      .frame-top,
      .frame-bot {
        position: absolute;
        height: 4px;
        background: #FF6B1A;
        box-shadow: 0 0 28px rgba(255, 107, 26, 0.7);
        left: 50%;
        transform: translateX(-50%);
      }
      .frame-top {
        top: 320px;
      }
      .frame-bot {
        bottom: 320px;
      }

      .kicker {
        color: #FF6B1A;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0.36em;
        margin-bottom: 18px;
        opacity: 0;
        text-transform: uppercase;
      }

      .heading {
        color: #ffffff;
        font-size: 60px;
        font-weight: 900;
        letter-spacing: -0.01em;
        line-height: 1;
        margin-bottom: 56px;
        opacity: 0;
        text-transform: uppercase;
        text-shadow:
          0 4px 0 rgba(0, 0, 0, 0.6),
          0 12px 30px rgba(0, 0, 0, 0.7);
      }

      .bullets {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
        max-width: 760px;
      }

      .bullets li {
        display: flex;
        align-items: baseline;
        gap: 28px;
        margin-bottom: 28px;
        opacity: 0;
        transform: translateX(-24px);
      }

      .bullets .num {
        flex: 0 0 auto;
        color: #FF6B1A;
        font-family: Consolas, monospace;
        font-size: 36px;
        font-weight: 900;
        letter-spacing: 0.08em;
        min-width: 60px;
      }
      .bullets .copy {
        flex: 1 1 auto;
        color: #ffffff;
        font-size: 44px;
        font-weight: 800;
        letter-spacing: -0.005em;
        line-height: 1.12;
      }
      .bullets .copy strong {
        color: #FF6B1A;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4.0"
      data-width="1080"
      data-height="1920"
    >
      <div class="clip" data-start="0" data-duration="4.0" data-track-index="0">
        <div class="backdrop"></div>
        <div class="shade"></div>

        <div id="frame-top" class="frame-top" style="width: 1px"></div>
        <div id="frame-bot" class="frame-bot" style="width: 1px"></div>

        <div class="stage">
          <div id="kicker" class="kicker">WHAT WE KNOW</div>
          <div id="heading" class="heading">METRO 2039</div>

          <ul id="bullets" class="bullets">
            <li>
              <span class="num">01</span>
              <span class="copy"><strong>Trailer live</strong>, official reveal confirmed</span>
            </li>
            <li>
              <span class="num">02</span>
              <span class="copy"><strong>Personal story</strong>, indoctrination and memory</span>
            </li>
            <li>
              <span class="num">03</span>
              <span class="copy"><strong>No date yet</strong>, platforms unconfirmed</span>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({
        paused: true,
        defaults: { ease: "power3.out" },
      });

      // Reveal sequence:
      //  0.00s  top frame line draws across (1px → 760px)
      //  0.15s  WHAT WE KNOW kicker fades in
      //  0.40s  heading fades + slides up
      //  0.70s  bullet 1 slides in from left
      //  0.95s  bullet 2 slides in
      //  1.20s  bullet 3 slides in
      //  1.50s  bottom frame line draws across
      tl.to("#frame-top", { width: 760, duration: 0.5, ease: "power2.out" }, 0)
        .to("#kicker", { opacity: 1, duration: 0.34 }, 0.15)
        .to(
          "#heading",
          {
            opacity: 1,
            duration: 0.5,
            ease: "back.out(1.4)",
          },
          0.4,
        )
        .to(
          "#bullets li",
          {
            opacity: 1,
            x: 0,
            duration: 0.42,
            stagger: 0.22,
            ease: "power2.out",
          },
          0.7,
        )
        .to(
          "#frame-bot",
          { width: 760, duration: 0.5, ease: "power2.out" },
          1.5,
        );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
